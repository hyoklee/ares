# IOWarp/chimaera runtime config for the read-bound CA1 benchmark (caseread).
# RAM-tier variant. Port 9653 to avoid collision with caseio (9643).
networking:
  port: 9653
  neighborhood_size: 32
  wait_for_restart: 30
  wait_for_restart_poll_period: 1

runtime:
  num_threads: 4
  queue_depth: 1024
  local_sched: "default"
  first_busy_wait: 10000
  learning_rate: 0.2

compose:
  - mod_name: clio_bdev
    pool_name: "ram::chi_default_bdev"
    pool_query: local
    pool_id: "301.0"
    bdev_type: ram
    capacity: "8GB"

  - mod_name: clio_cte_core
    pool_name: cte_main
    pool_query: local
    pool_id: "512.0"
    storage:
      - path: "ram::cte_ram_tier1"
        bdev_type: "ram"
        capacity_limit: "16GB"
        score: 1.0
    dpe:
      dpe_type: "max_bw"
    targets:
      neighborhood: 1
      default_target_timeout_ms: 30000
      poll_period_ms: 5000
